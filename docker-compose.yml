services:
  api:
    build: .
    container_name: wdp-api
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: wdp-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
