name: gitanalyzer_flutter
description: GitAnalyzer AI - Flutter mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.svg
    - assets/images/github_icon.svg
    - assets/images/google_icon.svg
    - assets/images/icons.svg
